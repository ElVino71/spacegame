<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starward Drift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }

    #ui-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: rgba(10, 10, 28, 0.95);
      border-right: 1px solid #334455;
      font-family: 'Share Tech Mono', monospace;
      color: #aabbaa;
      font-size: 12px;
      z-index: 10;
      overflow: hidden;
      user-select: none;
      padding: 14px 14px 10px;
    }
    #ui-panel.visible { display: flex; flex-direction: column; }

    #ui-panel .section {
      margin-bottom: 6px;
      padding-bottom: 8px;
      border-bottom: 1px solid #222244;
    }
    #ui-panel .section:last-child { border-bottom: none; }

    #ui-panel .section-title {
      color: #00aaff;
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    #ui-panel .row {
      display: flex;
      justify-content: space-between;
      line-height: 1.7;
    }
    #ui-panel .label { color: #556677; }
    #ui-panel .value { color: #ccddcc; }
    #ui-panel .value.good { color: #00ff88; }
    #ui-panel .value.warn { color: #ffaa00; }
    #ui-panel .value.bad { color: #ff4444; }

    #ui-panel .action {
      color: #00ff88;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.8;
    }
    #ui-panel .action.warn { color: #ff6644; }
    #ui-panel .action.muted { color: #556677; }

    #ui-panel .spacer { flex: 1; }

    #ui-panel .controls {
      font-size: 10px;
      color: #445566;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    #ui-panel .controls span { color: #667788; }

    .bar-bg {
      width: 100%;
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      margin: 2px 0 3px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .bar-fill.hull { background: #00ff88; }
    .bar-fill.fuel { background: #ffcc00; }
    .bar-fill.cargo { background: #00aaff; }
  </style>
</head>
<body>
  <div id="ui-panel">
    <div class="section" id="panel-ship"></div>
    <div class="section" id="panel-location"></div>
    <div class="section" id="panel-target"></div>
    <div class="spacer"></div>
    <div class="section controls" id="panel-controls"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
